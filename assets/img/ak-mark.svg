<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">AK Monogram</title>
  <desc id="desc">Premium AK initials mark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#091a35" />
      <stop offset="55%" stop-color="#081226" />
      <stop offset="100%" stop-color="#050913" />
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8ce6ff" />
      <stop offset="65%" stop-color="#4fb7ff" />
      <stop offset="100%" stop-color="#7fcbff" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#eaf8ff" />
      <stop offset="100%" stop-color="#b9e5ff" />
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.6" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="128" height="128" rx="24" fill="url(#bg)" />
  <rect x="8" y="8" width="112" height="112" rx="20" fill="none" stroke="url(#edge)" stroke-width="3" filter="url(#softGlow)" />
  <path d="M106 104L24 24" stroke="rgba(140,230,255,0.14)" stroke-width="2" />

  <g fill="none" stroke="url(#accent)" stroke-width="7.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M33 92L47 38L61 92" />
    <path d="M40 69H54" />
    <path d="M71 38V92" />
    <path d="M96 38L71 64L98 92" />
  </g>
</svg>
